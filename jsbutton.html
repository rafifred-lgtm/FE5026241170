<!DOCTYPE html>
<html>
<head>
    <title>Menu Navigasi - Rafif</title>
    <link rel="stylesheet" type="text/css" href="css1.css">
    <style>
        .container-button {
            text-align: center;
            margin-top: 50px;
        }
        button {
            padding: 15px 25px;
            font-size: 16px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            margin: 10px;
            transition: 0.3s;
        }
        button:hover {
            background-color: #0056b3;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="publis">
        <h1>Dashboard Navigasi</h1>
        <p>Gunakan tombol di bawah untuk berpindah antar halaman</p>
    </div>

    <div class="container-button">
        <button onclick="window.location.href='intro.html'">Buka Intro</button>
        <button onclick="window.location.href='news.html'">Buka News (Internal CSS)</button>
        <button onclick="window.location.href='news1.html'">Buka News 1 (Eksternal CSS)</button>
    </div>

    <hr>

    <div class="agakmasuk">
        <p id="namareporter">Dibuat oleh: Rafif Muhammad Santoso</p>
    </div>

</body>
</html>
